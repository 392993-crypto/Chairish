<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Chairish</title>
</head>
<body>
    <header>
    <nav class="nav-container">
        <a href="#" class="logo">🪑 Chairish</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="signin.html">Sign In</a>
            <a href="register.html" class="btn">Register Now</a>
        </div>
    </nav>
</header>

    <main class="auth-container">
        <h2>Create an Account</h2>
        <p>i know u like chairs oooo</p>

        <form id="registrationForm" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="e.g., ChairLover99">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="e.g., chairfan@gmail.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">Register & Log In</button>
        </form>

        <div id="formFeedback" class="feedback-message"></div>
    </main>

    <script src="register.js"></script>
</body>
</html>
