<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Chair - ErgoChair Share</title>
</head>
<body>

    <nav class="navbar">
      <div class="nav-left">
        <a href="home.html" class="nav-link">Home</a>
        <a href="create.html" class="nav-link">Add Chair</a>
        <a href="profile.html" class="nav-link">Profile</a>
        <a href="checkpoints.html" class="nav-link">Checkpoints</a>
      </div>

      <div class="nav-right">
        <a href="admin.html" class="nav-link admin-btn">Admin</a>
      </div>
    </nav>

    <div class="container">
        <h1>Edit Chair Details</h1>
        <p>Make your changes below and click save to update the community feed.</p>
        
        <form id="edit-chair-form">
            <label for="chair-name"><strong>Chair Name:</strong></label><br>
            <input type="text" id="chair-name" required style="width: 100%; max-width: 400px; margin-bottom: 15px;"><br>

            <label for="chair-brand"><strong>Brand:</strong></label><br>
            <input type="text" id="chair-brand" required style="width: 100%; max-width: 400px; margin-bottom: 15px;"><br>

            <label for="chair-image"><strong>Image URL:</strong></label><br>
            <input type="text" id="chair-image" style="width: 100%; max-width: 400px; margin-bottom: 15px;"><br>

            <label for="chair-tags"><strong>Tags (separate with commas):</strong></label><br>
            <input type="text" id="chair-tags" placeholder="mesh, lumbar support, adjustable" style="width: 100%; max-width: 400px; margin-bottom: 15px;"><br>

            <label for="chair-description"><strong>Description:</strong></label><br>
            <textarea id="chair-description" rows="6" required style="width: 100%; max-width: 400px; margin-bottom: 15px;"></textarea><br>

            <button type="submit" style="cursor: pointer; padding: 8px 15px;">Save Changes</button>
            <a href="home.html" style="margin-left: 10px;">Cancel</a>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const editForm = document.getElementById('edit-chair-form');
            
            // 1. Get the chair ID from the URL (?id=XXX)
            const urlParams = new URLSearchParams(window.location.search);
            const chairId = urlParams.get('id');

            if (!chairId) {
                alert("No chair ID found! Returning to home.");
                window.location.href = 'home.html';
                return;
            }

            // 2. Load the current chairs list from localStorage
            const chairs = JSON.parse(localStorage.getItem('chairs')) || [];

            // 3. Find the specific chair we want to edit
            const activeChair = chairs.find(c => String(c.id) === String(chairId));

            if (!activeChair) {
                alert("Chair not found in data! Returning to home.");
                window.location.href = 'home.html';
                return;
            }

            // 4. Fill up the form input fields with the chair's current data
            document.getElementById('chair-name').value = activeChair.name || '';
            document.getElementById('chair-brand').value = activeChair.brand || '';
            document.getElementById('chair-image').value = activeChair.image || '';
            document.getElementById('chair-description').value = activeChair.description || '';
            
            // Turn the tags array back into a comma-separated string for easy editing
            if (activeChair.tags && Array.isArray(activeChair.tags)) {
                document.getElementById('chair-tags').value = activeChair.tags.join(', ');
            } else {
                document.getElementById('chair-tags').value = '';
            }

            // 5. Handle saving the form data when the user clicks submit
            editForm.addEventListener('submit', (event) => {
                event.preventDefault(); // Stop the page from reloading automatically

                // Update the fields on our active chair object with the new inputs
                activeChair.name = document.getElementById('chair-name').value;
                activeChair.brand = document.getElementById('chair-brand').value;
                activeChair.image = document.getElementById('chair-image').value;
                activeChair.description = document.getElementById('chair-description').value;

                // Grab the tags string, split it by commas, and clean up extra spaces
                const tagsInput = document.getElementById('chair-tags').value;
                activeChair.tags = tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag !== '');

                // Save the updated list back to localStorage
                localStorage.setItem('chairs', JSON.stringify(chairs));

                alert('Chair updated successfully!');
                
                // Take the user back to the main feed to see their changes
                window.location.href = 'home.html';
            });
        });
    </script>
</body>
</html>
