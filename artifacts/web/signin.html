<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chairish | Sign In</title>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">🪑 Chairish</a>
            <div>
                <a href="index.html">Home</a>
                <a href="signin.html">Sign In</a>
                <a href="register.html">Register Now</a>
            </div>
        </nav>
    </header>

    <main>
        <h2>Sign In</h2>
        
        <div id="error-message"></div>

        <form id="login-form">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" required>
            </div>
            
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <div>
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorBox = document.getElementById('error-message');
            
            errorBox.textContent = ''; // Clear previous error messages

            // 1. Check for Admin Account
            if (usernameInput === 'admin' && passwordInput === 'admin123') {
                const adminUser = {
                    userId: 'admin-000',
                    username: 'admin',
                    isAdmin: true
                };
                localStorage.setItem('activeUser', JSON.stringify(adminUser));
                window.location.href = 'admin.html'; 
                return;
            }

            // 2. Check for regular registered users in localStorage
            const usersData = localStorage.getItem('users');
            let authenticatedUser = null;

            if (usersData) {
                const usersList = JSON.parse(usersData);
                // Look for matching username and password
                authenticatedUser = usersList.find(u => u.username === usernameInput && u.password === passwordInput);
            }

            if (authenticatedUser) {
                // Set active user session state
                const userSession = {
                    userId: authenticatedUser.userId,
                    username: authenticatedUser.username,
                    isAdmin: false
                };
                localStorage.setItem('activeUser', JSON.stringify(userSession));
                
                // Redirect to the Home feed
                window.location.href = 'home.html';
            } else {
                // Display error text
                errorBox.textContent = 'Invalid username or password. Please try again.';
            }
        });
    </script>

</body>
</html>
